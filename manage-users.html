<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — Admin — Nestify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-nestify" id="mainNavbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand navbar-brand-nestify" href="index.html"><i class="bi bi-house-heart-fill"></i> NEST<span>IFY</span></a>
      <span class="badge bg-danger ms-2" style="font-size:0.7rem;">ADMIN</span>
      <div class="ms-auto nav-auth-section"></div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-2 col-md-3 p-0">
          <div class="dashboard-sidebar">
            <nav class="dashboard-sidebar-nav">
              <a href="admin-dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
              <a href="manage-listings.html" class="sidebar-link"><i class="bi bi-building"></i> Manage Listings</a>
              <a href="manage-users.html" class="sidebar-link active"><i class="bi bi-people"></i> Manage Users</a>
              <a href="#" class="sidebar-link"><i class="bi bi-star"></i> Reviews</a>
              <a href="#" class="sidebar-link"><i class="bi bi-gear"></i> Settings</a>
            </nav>
          </div>
        </div>

        <div class="col-lg-10 col-md-9">
          <div class="dashboard-content">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
              <div>
                <h3 class="fw-700 mb-1">Manage Users</h3>
                <p class="text-muted-custom fs-sm">View and manage all registered users</p>
              </div>
              <div class="d-flex gap-2">
                <select class="form-select-dark" id="roleFilter" style="width:auto;padding:0.4rem 2rem 0.4rem 0.8rem;font-size:0.85rem;">
                  <option value="">All Roles</option>
                  <option value="user">User</option>
                  <option value="client">Client</option>
                  <option value="admin">Admin</option>
                </select>
                <input type="text" class="form-control-dark" id="searchInput"
                       placeholder="Search users..." style="width:180px;padding:0.4rem 0.8rem;font-size:0.85rem;">
              </div>
            </div>

            <!-- Stats -->
            <div class="row g-4 mb-4">
              <div class="col-md-4">
                <div class="stat-card">
                  <div class="stat-icon blue"><i class="bi bi-people"></i></div>
                  <div class="stat-info"><h3 id="statTotal">—</h3><p>Total Users</p></div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="stat-card">
                  <div class="stat-icon orange"><i class="bi bi-person-badge"></i></div>
                  <div class="stat-info"><h3 id="statClients">—</h3><p>Clients</p></div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="stat-card">
                  <div class="stat-icon red"><i class="bi bi-shield-lock"></i></div>
                  <div class="stat-info"><h3 id="statAdmins">—</h3><p>Admins</p></div>
                </div>
              </div>
            </div>

            <div id="loadingState" class="text-center py-5">
              <div class="spinner-border text-accent"></div>
              <p class="text-muted-custom mt-2 fs-sm">Loading users...</p>
            </div>

            <div id="tableWrap" style="display:none;">
              <div class="table-dark-custom">
                <table>
                  <thead>
                    <tr>
                      <th>User</th>
                      <th>Email</th>
                      <th>Role</th>
                      <th>Joined</th>
                      <th>Listings</th>
                    </tr>
                  </thead>
                  <tbody id="usersTbody"></tbody>
                </table>
              </div>
              <p class="text-muted-custom fs-sm mt-2" id="resultsCount"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCB3n4oRMttZP3hEstN1WhQIUSfnMcNK3o",
      authDomain: "stayfinder-india.firebaseapp.com",
      projectId: "stayfinder-india",
      storageBucket: "stayfinder-india.firebasestorage.app",
      messagingSenderId: "645510509071",
      appId: "1:645510509071:web:d9924d4780d3f185a5e97a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allUsers = [], listingCountMap = {}, currentAdminId = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists() || snap.data().role !== 'admin') { window.location.href = 'index.html'; return; }
      currentAdminId = user.uid;
      loadUsers();
    });

    async function loadUsers() {
      try {
        // Load listings to count per user
        const listingsSnap = await getDocs(collection(db, "listings"));
        listingsSnap.docs.forEach(d => {
          const ownerId = d.data().ownerId;
          if (ownerId) listingCountMap[ownerId] = (listingCountMap[ownerId] || 0) + 1;
        });

        // Load users
        const usersSnap = await getDocs(collection(db, "users"));
        allUsers = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        allUsers.sort((a, b) => (b.createdAt?.toDate?.() || 0) - (a.createdAt?.toDate?.() || 0));

        // Stats
        document.getElementById('statTotal').textContent   = allUsers.length;
        document.getElementById('statClients').textContent = allUsers.filter(u => u.role === 'client').length;
        document.getElementById('statAdmins').textContent  = allUsers.filter(u => u.role === 'admin').length;

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('tableWrap').style.display = 'block';
        renderTable(allUsers);
      } catch(err) {
        document.getElementById('loadingState').innerHTML = `<p class="text-danger">${err.message}</p>`;
      }
    }

    function renderTable(users) {
      document.getElementById('resultsCount').textContent = `Showing ${users.length} user${users.length !== 1 ? 's' : ''}`;
      const tbody = document.getElementById('usersTbody');
      tbody.innerHTML = users.map(u => {
        const photo = u.photoURL ||
          `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name||'U')}&background=ff6b00&color=fff&size=36`;
        const joined = u.createdAt?.toDate?.()?.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) || '—';
        const isCurrentAdmin = u.id === currentAdminId;

        return `
          <tr id="user-row-${u.id}">
            <td>
              <div class="table-user-info">
                <img src="${esc(photo)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;"
                     onerror="this.src='https://ui-avatars.com/api/?name=U&background=ff6b00&color=fff&size=36'" alt="">
                <div><h6>${esc(u.name || 'Unknown')}</h6></div>
              </div>
            </td>
            <td class="text-muted-custom fs-sm">${esc(u.email || '—')}</td>
            <td>
              ${isCurrentAdmin
                ? `<span class="role-badge admin">admin</span>`
                : `<select class="form-select-dark role-select"
                           data-id="${u.id}"
                           style="width:auto;padding:0.25rem 2rem 0.25rem 0.6rem;font-size:0.8rem;border-radius:50px;">
                    <option value="user"   ${u.role === 'user'   ? 'selected' : ''}>User</option>
                    <option value="client" ${u.role === 'client' ? 'selected' : ''}>Client</option>
                    <option value="admin"  ${u.role === 'admin'  ? 'selected' : ''}>Admin</option>
                  </select>`
              }
            </td>
            <td class="text-muted-custom fs-sm">${joined}</td>
            <td>${listingCountMap[u.id] || 0}</td>
          </tr>`;
      }).join('');

      // Role change listeners
      tbody.querySelectorAll('.role-select').forEach(sel => {
        sel.addEventListener('change', async function() {
          const userId = this.dataset.id;
          const newRole = this.value;
          try {
            await updateDoc(doc(db, "users", userId), { role: newRole });
            // Update local
            const u = allUsers.find(u => u.id === userId);
            if (u) u.role = newRole;
            // Update stats
            document.getElementById('statClients').textContent = allUsers.filter(u => u.role === 'client').length;
            document.getElementById('statAdmins').textContent  = allUsers.filter(u => u.role === 'admin').length;
            if (window.showToast) window.showToast(`Role updated to ${newRole}`, 'success');
          } catch(err) {
            if (window.showToast) window.showToast('Failed: ' + err.message, 'error');
            this.value = allUsers.find(u => u.id === userId)?.role || 'user';
          }
        });
      });
    }

    function applyFilters() {
      let results = [...allUsers];
      const role   = document.getElementById('roleFilter').value;
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      if (role) results = results.filter(u => u.role === role);
      if (search) results = results.filter(u =>
        `${u.name} ${u.email}`.toLowerCase().includes(search)
      );
      renderTable(results);
    }

    document.getElementById('roleFilter').addEventListener('change', applyFilters);
    document.getElementById('searchInput').addEventListener('input', applyFilters);

    function esc(t) {
      if (!t) return '';
      const d = document.createElement('div');
      d.textContent = String(t);
      return d.innerHTML;
    }
  </script>
</body>
</html>
