<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Nestify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-nestify" id="mainNavbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand navbar-brand-nestify" href="index.html"><i class="bi bi-house-heart-fill"></i> NEST<span>IFY</span></a>
      <div class="ms-auto nav-auth-section"></div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-2 col-md-3 p-0">
          <div class="dashboard-sidebar">
            <nav class="dashboard-sidebar-nav">
              <a href="client-dashboard.html" class="sidebar-link active"><i class="bi bi-speedometer2"></i> Dashboard</a>
              <a href="add-listing.html" class="sidebar-link"><i class="bi bi-plus-circle"></i> Add Listing</a>
              <a href="my-listings.html" class="sidebar-link"><i class="bi bi-building"></i> My Listings</a>
              <a href="#" class="sidebar-link"><i class="bi bi-chat-dots"></i> Leads</a>
              <a href="#" class="sidebar-link"><i class="bi bi-bar-chart"></i> Analytics</a>
              <a href="#" class="sidebar-link"><i class="bi bi-gear"></i> Settings</a>
            </nav>
          </div>
        </div>

        <div class="col-lg-10 col-md-9">
          <div class="dashboard-content">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
              <div>
                <h3 class="fw-700 mb-1">Dashboard</h3>
                <p class="text-muted-custom fs-sm" id="welcomeMsg">Welcome back!</p>
              </div>
              <a href="add-listing.html" class="btn btn-accent">
                <i class="bi bi-plus-lg"></i> Add New Listing
              </a>
            </div>

            <!-- Stats -->
            <div class="row g-4 mb-4">
              <div class="col-xl-3 col-md-6">
                <div class="stat-card">
                  <div class="stat-icon orange"><i class="bi bi-building"></i></div>
                  <div class="stat-info"><h3 id="statTotal">—</h3><p>Total Listings</p></div>
                </div>
              </div>
              <div class="col-xl-3 col-md-6">
                <div class="stat-card">
                  <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
                  <div class="stat-info"><h3 id="statApproved">—</h3><p>Approved</p></div>
                </div>
              </div>
              <div class="col-xl-3 col-md-6">
                <div class="stat-card">
                  <div class="stat-icon blue"><i class="bi bi-eye"></i></div>
                  <div class="stat-info"><h3 id="statViews">—</h3><p>Total Views</p></div>
                </div>
              </div>
              <div class="col-xl-3 col-md-6">
                <div class="stat-card">
                  <div class="stat-icon yellow"><i class="bi bi-clock"></i></div>
                  <div class="stat-info"><h3 id="statPending">—</h3><p>Pending</p></div>
                </div>
              </div>
            </div>

            <!-- Recent Listings -->
            <div class="detail-content-card">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="form-card-title mb-0"><i class="bi bi-clock-history"></i> Recent Listings</h5>
                <a href="my-listings.html" class="text-accent fs-sm">View All <i class="bi bi-arrow-right"></i></a>
              </div>

              <div id="recentLoading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm text-accent"></div>
              </div>

              <div id="recentTable" style="display:none;">
                <div class="table-dark-custom">
                  <table>
                    <thead>
                      <tr>
                        <th>Property</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody id="recentTbody"></tbody>
                  </table>
                </div>
              </div>

              <div id="recentEmpty" style="display:none;" class="text-center py-4">
                <p class="text-muted-custom fs-sm">No listings yet. <a href="add-listing.html" class="text-accent">Add your first listing →</a></p>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCB3n4oRMttZP3hEstN1WhQIUSfnMcNK3o",
      authDomain: "stayfinder-india.firebaseapp.com",
      projectId: "stayfinder-india",
      storageBucket: "stayfinder-india.firebasestorage.app",
      messagingSenderId: "645510509071",
      appId: "1:645510509071:web:d9924d4780d3f185a5e97a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }

      // Welcome message
      const firstName = user.displayName?.split(' ')[0] || 'there';
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${firstName}! Here's your overview.`;

      // Load listings
      try {
        const q = query(collection(db, "listings"), where("ownerId", "==", user.uid));
        const snap = await getDocs(q);
        const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Sort newest first
        listings.sort((a, b) => (b.createdAt?.toDate?.() || 0) - (a.createdAt?.toDate?.() || 0));

        // Stats
        const total    = listings.length;
        const approved = listings.filter(l => l.status === 'approved').length;
        const pending  = listings.filter(l => l.status === 'pending').length;
        const views    = listings.reduce((sum, l) => sum + (l.viewsCount || 0), 0);

        document.getElementById('statTotal').textContent    = total;
        document.getElementById('statApproved').textContent = approved;
        document.getElementById('statPending').textContent  = pending;
        document.getElementById('statViews').textContent    = views.toLocaleString('en-IN');

        // Recent table (latest 5)
        document.getElementById('recentLoading').style.display = 'none';

        if (listings.length === 0) {
          document.getElementById('recentEmpty').style.display = 'block';
          return;
        }

        document.getElementById('recentTable').style.display = 'block';
        const statusMap = {
          approved: `<span class="status-badge approved"><i class="bi bi-check-circle"></i> Approved</span>`,
          pending:  `<span class="status-badge pending"><i class="bi bi-clock"></i> Pending</span>`,
          rejected: `<span class="status-badge rejected"><i class="bi bi-x-circle"></i> Rejected</span>`,
          draft:    `<span class="status-badge" style="background:rgba(176,176,176,0.15);color:#b0b0b0;"><i class="bi bi-file-earmark"></i> Draft</span>`
        };

        document.getElementById('recentTbody').innerHTML = listings.slice(0, 5).map(l => {
          const img = l.images?.[0] || 'https://images.unsplash.com/photo-1555854877-bab0e564b8d5?w=60&h=60&fit=crop';
          const price = '₹' + Number(l.price || 0).toLocaleString('en-IN');
          return `
            <tr>
              <td>
                <div class="table-user-info">
                  <img src="${esc(img)}" style="border-radius:6px;width:48px;height:48px;object-fit:cover;"
                       onerror="this.src='https://images.unsplash.com/photo-1555854877-bab0e564b8d5?w=60&h=60&fit=crop'" alt="">
                  <div>
                    <h6 style="font-size:0.88rem;">${esc(l.title)}</h6>
                    <p style="font-size:0.75rem;">${esc(l.location || '')}, ${esc(l.city || '')}</p>
                  </div>
                </div>
              </td>
              <td><span class="badge-type">${esc(l.type || 'PG')}</span></td>
              <td class="fw-600">${price}</td>
              <td>${statusMap[l.status] || statusMap.pending}</td>
              <td class="text-muted-custom">${l.viewsCount || 0}</td>
              <td>
                <div class="d-flex gap-1">
                  <a href="detail.html?id=${l.id}" class="btn-icon" title="View"><i class="bi bi-eye"></i></a>
                  <a href="edit-listing.html?id=${l.id}" class="btn-icon" title="Edit"><i class="bi bi-pencil"></i></a>
                  <button class="btn-icon del-btn" title="Delete"
                          style="border-color:var(--danger);color:var(--danger);"
                          data-id="${l.id}">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>`;
        }).join('');

        // Delete from dashboard
        document.querySelectorAll('.del-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Delete this listing?')) return;
            try {
              await deleteDoc(doc(db, "listings", btn.dataset.id));
              btn.closest('tr').remove();
              if (window.showToast) window.showToast('Listing deleted.', 'success');
            } catch(e) {
              if (window.showToast) window.showToast('Delete failed.', 'error');
            }
          });
        });

      } catch(err) {
        console.error(err);
        document.getElementById('recentLoading').innerHTML =
          `<p class="text-danger fs-sm">Failed to load: ${err.message}</p>`;
      }
    });

    function esc(t) {
      if (!t) return '';
      const d = document.createElement('div');
      d.textContent = String(t);
      return d.innerHTML;
    }
  </script>
</body>
</html>
